<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인</title>
  <style>
    body {font-family: Inter, sans-serif; background:#f5f7fb; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;}
    .card {width:100%; max-width:400px; background:white; padding:28px; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.06);}    
    h1 {margin-top:0; font-size:22px; text-align:center;}
    label {display:block; margin-bottom:6px; font-size:14px;}
    input {width:100%; padding:10px 12px; border:1px solid #d8dbe2; border-radius:8px; margin-bottom:14px; font-size:14px;}
    button {width:100%; padding:12px; border:0; border-radius:8px; background:#4f46e5; color:white; font-size:15px; font-weight:600; cursor:pointer;}
    .link {text-align:center; margin-top:14px; font-size:14px; color:#555;}
    a {color:#4f46e5; text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>로그인</h1>

    <form id="loginForm" onsubmit="return false;">
      <label for="email">이메일</label>
      <input id="email" type="email" placeholder="example@domain.com" required />

      <label for="password">비밀번호</label>
      <input id="password" type="password" placeholder="비밀번호 입력" required />

      <button type="submit" id="loginBtn">로그인</button>
    </form>

    <div class="link">아직 회원이 아니신가요? <a href="#">회원가입</a></div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(){
      const email = document.getElementById("email").value.trim();
      const pw = document.getElementById("password").value.trim();

      if(!email || !pw){
        alert("이메일과 비밀번호를 입력해주세요.");
        return;
      }

      // 실제 서비스에서는 서버로 fetch 요청을 보냄
      alert("로그인 시도: " + email);
    });
  </script>
</body>
</html>
